<body>
  <h1>ATIVIDADE 1</h1>
  <h2>Sistema de Média Escolar</h2>


  <p>Média mínima para aprovação = 7</p>

  <label for="nota1">Digite a primeira nota:</label>
  <input type="number" id="nota1" step="0.1">
  <br><br>

  <label for="nota2">Digite a segunda nota:</label>
  <input type="number" id="nota2" step="0.1">
  <br><br>

  <button onclick="calcularMedia()">Calcular Média</button>

  <h3 id="resultadoMedia"></h3>
  <h3 id="resultadoSituacao"></h3>

  <script src="media.js"></script>
</body>
