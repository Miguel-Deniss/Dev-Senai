<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lógica de Programação</title>
</head>
<body>
  <h1>Lógica de Programação</h1>

  <p>Clique nos botões para executar os exercicios:</p>

  <button onclick="exercicioFor()">1 - FOR (Contador)</button>
  <button onclick="exercicioWhile()">2 - WHILE(condicional)</button>
  <button onclick="exerciciosVetor()">3 - Vetores</button>
  <button onclick="exercicioMatriz()">4 - Matriz</button>

  <div id="saida"></div>

  <script>
    function mostrar(texto) {
      document.getElementById('saida').innerHTML += texto + "<br>";
    }

    function limpar(){
      document.getElementById('saida').innerHTML = "";
    }

    //For
    function exercicioFor(){
      limpar();
      
      let soma = 0;
      
      for(let i = 1; i <= 10; i++){
        soma += i;
        mostrar("Número: " + i);
      }
      mostrar("Soma total: " + soma);
    }

    //WHILE

    function exercicioWhile(){
      limpar();

      let i = 1;

      while(i <= 10){
       mostrar("Contador: " + i)
      i++; 
      }
    }

    //Vetor

    function exerciciosVetor(){
      limpar();

      let notas = [7, 8, 6, 9];
      let soma = 0;

      for(let i = 0; i < notas.length; i++){
      soma += notas[i];
      mostrar("Nota: " + notas[i]);
    }

      let media = soma / notas.length;

      mostrar("Media: " + media.toFixed(2));
  }

    //Matriz

    function exercicioMatriz(){
      limpar();

      let alunos = [
        [7, 8, 9],
        [6, 7, 8],
        [9, 9, 10]
      ]

      for(let i = 0; i < alunos.length; i++ ){
        let soma = 0;
        
        for(let j = 0; j < alunos[i].length; j++){
          soma += alunos[i][j];
        }

        let media = soma / alunos[i].length;
        
        if (media >= 7){
          mostrar("Aluno " + (i + 1) + ": Media " + media.toFixed(2) + "Aprovado");
        } else {
          mostrar("Aluno" + (i + 1) + ": Media " + media.toFixed(2) + "Reprovado")
        }
      }
    }

  </script>
</body>
</html>
