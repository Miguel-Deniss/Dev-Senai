<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boletim dos Alunos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      text-align: center;
      padding: 30px;
    }

    h1 {
      color: #222;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background-color: #0077cc;
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background-color: #005fa3;
    }

    #resultado {
      margin-top: 30px;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      text-align: left;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <h1>Gerador de Boletim</h1>

  <button onclick="gerarBoletim()">Gerar Boletim</button>

  <div id="resultado"></div>

  <script>
    function classificarAluno(media) {
      if (media >= 9) {
        return "Excelente";
      } else if (media >= 7) {
        return "Bom";
      } else if (media >= 6) {
        return "Aprovado";
      } else {
        return "Reprovado";
      }
    }

    function gerarBoletim() {
      let alunos = [
        [7, 8, 6],
        [5, 4, 6],
        [9, 9, 9]
      ];

      let resultado = document.getElementById("resultado");
      let textoFinal = "";

      let maiorMedia = 0;
      let menorMedia = 10;
      let totalAprovados = 0;

      for (let i = 0; i < alunos.length; i++) {
        let notas = alunos[i];
        let soma = 0;
        let indiceNota = 0;

        while (indiceNota < notas.length) {
          soma += notas[indiceNota];
          indiceNota++;
        }

        let media = soma / notas.length;
        let classificacao = classificarAluno(media);

        if (media >= 6) {
          totalAprovados++;
        }

        if (media > maiorMedia) {
          maiorMedia = media;
        }

        if (media < menorMedia) {
          menorMedia = media;
        }

        textoFinal += "Aluno " + (i + 1) + ": Média " + media.toFixed(1) + " → " + classificacao + "<br>";
      }

      textoFinal += "<hr>";
      textoFinal += "Total de alunos aprovados: " + totalAprovados + "<br>";
      textoFinal += "Maior média: " + maiorMedia.toFixed(1) + "<br>";
      textoFinal += "Menor média: " + menorMedia.toFixed(1);

      resultado.innerHTML = textoFinal;
    }
  </script>
</body>
</html>
